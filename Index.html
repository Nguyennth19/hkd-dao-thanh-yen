    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splashScreenGame');
        if (splash) {
          splash.style.opacity = '0'; // Bắt đầu mờ dần
          setTimeout(() => {
            splash.remove(); // Xóa hẳn khỏi DOM sau khi mờ xong
          }, 1000);
        }
      }, 5000); // Hiển thị chuẩn 5 giây
    });
