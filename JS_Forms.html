<script>
// GIAI ĐOẠN 4: Hàm tự động định dạng phân cách hàng nghìn khi đang gõ
function formatNumberInput(e) {
  let value = e.target.value.replace(/[^0-9]/g, ''); // Loại bỏ ký tự lạ (chữ, dấu phẩy, chấm)
  if (value !== '') {
    e.target.value = new Intl.NumberFormat('vi-VN').format(parseInt(value, 10)); 
  } else {
    e.target.value = '';
  }
}

function renderDropdownOptions(type) {
  const selectId = type === 'Thu' ? 'incCategory' : 'expCategory';
  const selectEl = document.getElementById(selectId);
  if(!selectEl) return;
  
  let options = type === 'Thu' ? globalCategories.thu : globalCategories.chi;
  let html = '<option value="" disabled selected>-- Chọn danh mục --</option>';
  options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
  if(!options.includes('Khác')) html += `<option value="Khác">Khác</option>`;
  selectEl.innerHTML = html;
}

function checkCustomCategory(type, selectedValue) {
  const wrapper = document.getElementById(type === 'Thu' ? 'incCustomWrapper' : 'expCustomWrapper');
  const input = document.getElementById(type === 'Thu' ? 'incCustomCategory' : 'expCustomCategory');
  if (selectedValue === 'Khác') {
    wrapper.classList.remove('hidden'); input.setAttribute('required', 'true');
  } else {
    wrapper.classList.add('hidden'); input.removeAttribute('required'); input.value = '';
  }
}

function loadTransactions(typeFilter) {
  showSpinner('Đang tải lịch sử giao dịch...');
  // Lấy giá trị lọc tháng truyền cho Backend
  const mFilter = document.getElementById('monthFilter') ? document.getElementById('monthFilter').value : 'all';

  google.script.run
    .withSuccessHandler(function(res) {
      hideSpinner();
      if (res.success) {
        let html = ''; let totalVal = 0;
        if (res.data.length === 0) {
          html = `<tr><td colspan="6" class="p-6 text-center text-gray-400 italic">Chưa có giao dịch trong thời gian này.</td></tr>`;
        } else {
          res.data.forEach(item => {
            totalVal += parseFloat(item.net) || 0;
            let linkFile = item.fileUrl ? `<a href="${item.fileUrl}" target="_blank" class="text-blue-500 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded-md"><i class="fas fa-file-alt"></i></a>` : `<span class="text-gray-300">-</span>`;
            
            let actionBtns = `
              <div class="flex items-center justify-center space-x-2">
                <button onclick="editTx('${item.id}', ${item.amount})" class="text-blue-500 hover:text-blue-700 bg-blue-50 px-2 py-1 rounded-md" title="Sửa số tiền"><i class="fas fa-edit"></i></button>
                <button onclick="deleteTx('${item.id}', '${item.type}')" class="text-red-500 hover:text-red-700 bg-red-50 px-2 py-1 rounded-md" title="Xóa"><i class="fas fa-trash"></i></button>
              </div>`;

            html += `<tr id="row-${item.id}" class="hover:bg-gray-50/70 transition-colors">
                <td class="p-3 pl-4 md:pl-6 font-medium text-gray-600">${item.date}</td>
                <td class="p-3"><span class="px-2 py-1 rounded-md text-[10px] md:text-xs font-bold ${typeFilter === 'Thu' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'} whitespace-nowrap">${item.category}</span></td>
                <td class="p-3 text-right font-medium">${formatCurrency(item.amount)}</td>
                <td class="p-3 text-right font-black text-gray-800">${formatCurrency(item.net)}</td>
                <td class="p-3 text-center">${linkFile}</td>
                <td class="p-3 text-center">${actionBtns}</td>
              </tr>`;
          });
        }
        if (typeFilter === 'Thu') {
          document.getElementById('tableIncomeHistory').innerHTML = html; document.getElementById('txtTotalIncomeHeader').innerText = "Tổng: " + formatCurrency(totalVal);
        } else {
          document.getElementById('tableExpenseHistory').innerHTML = html; document.getElementById('txtTotalExpenseHeader').innerText = "Tổng: " + formatCurrency(totalVal);
        }
      }
    }).getTransactions(typeFilter, mFilter);
}

function getBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// BƯỚC 3 & 4: THU THẬP TRƯỜNG CHUẨN THUẾ VÀ "RỬA" DẤU CHẤM CỦA SỐ TIỀN
async function handleFormSubmit(event, transactionType) {
  event.preventDefault();
  const prefix = transactionType === 'Thu' ? 'inc' : 'exp';
  
  // Rửa dấu chấm ra khỏi chuỗi để lấy số nguyên thủy cho Backend
  let rawAmount = document.getElementById(prefix + 'Amount').value.replace(/\./g, '');
  let rawTax = document.getElementById(prefix + 'Tax').value.replace(/\./g, '');
  let amountVal = parseInt(rawAmount, 10) || 0;
  let taxVal = parseInt(rawTax, 10) || 0;
  
  const payload = {
    id: 'temp_' + Date.now(), 
    date: document.getElementById(prefix + 'Date').value,
    type: transactionType,
    category: document.getElementById(prefix + 'Category').value,
    customCategory: document.getElementById(prefix + 'CustomCategory') ? document.getElementById(prefix + 'CustomCategory').value : '',
    
    taxCode: document.getElementById(prefix + 'TaxCode') ? document.getElementById(prefix + 'TaxCode').value : '',
    invoiceNumber: document.getElementById(prefix + 'InvoiceNumber') ? document.getElementById(prefix + 'InvoiceNumber').value : '',
    description: document.getElementById(prefix + 'Description') ? document.getElementById(prefix + 'Description').value : '',
    
    amount: amountVal,
    tax: taxVal,
    note: document.getElementById(prefix + 'Note').value,
    fileUrl: '',
    net: amountVal - taxVal
  };
  
  // 1. Vẽ giao diện ngay lập tức trong 0.01s
  renderOptimisticRow(payload);
  
  // Xóa trắng form để người dùng nhập tiếp
  document.getElementById(prefix === 'inc' ? 'formIncome' : 'formExpense').reset();
  const customWrap = document.getElementById(prefix + 'CustomWrapper');
  if(customWrap) customWrap.classList.add('hidden');
  
  // 2. Chạy ngầm Upload và Lưu Server
  const fileInput = document.getElementById(prefix + 'File');
  if (fileInput.files && fileInput.files.length > 0) {
    try {
      const base64 = await getBase64(fileInput.files[0]);
      google.script.run.withSuccessHandler(res => {
        if(res.success) { payload.fileUrl = res.url; submitDataToServer(payload, transactionType); } 
      }).uploadFileToDrive(base64, fileInput.files[0].name, transactionType);
    } catch(e) { console.error("Lỗi file"); }
  } else {
    submitDataToServer(payload, transactionType);
  }
}

function renderOptimisticRow(payload) {
  let html = `<tr id="row-${payload.id}" class="bg-blue-50/40 opacity-70 transition-all">
    <td class="p-3 pl-4 md:pl-6 font-medium text-gray-600">${payload.date} <i class="fas fa-spinner fa-spin text-blue-400 ml-1 text-[10px]"></i></td>
    <td class="p-3"><span class="px-2 py-1 rounded-md text-[10px] md:text-xs font-bold ${payload.type === 'Thu' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'} whitespace-nowrap">${payload.customCategory || payload.category}</span></td>
    <td class="p-3 text-right font-medium">${formatCurrency(payload.amount)}</td>
    <td class="p-3 text-right font-black text-gray-800">${formatCurrency(payload.net)}</td>
    <td class="p-3 text-center"><i class="fas fa-cloud-upload-alt text-gray-400"></i></td>
    <td class="p-3 text-center"><span class="text-[10px] text-gray-500 font-bold">Đang lưu...</span></td>
  </tr>`;
  
  const tbodyId = payload.type === 'Thu' ? 'tableIncomeHistory' : 'tableExpenseHistory';
  const tbody = document.getElementById(tbodyId);
  
  if(tbody.querySelector('td[colspan]')) tbody.innerHTML = '';
  
  tbody.insertAdjacentHTML('afterbegin', html);
  
  const headerId = payload.type === 'Thu' ? 'txtTotalIncomeHeader' : 'txtTotalExpenseHeader';
  const headerEl = document.getElementById(headerId);
  if(headerEl) {
     // Giai đoạn 4: Fix lỗi tính toán tổng tiền do hàm format mới rút gọn (triệu/k)
     // Ở đây chúng ta sẽ đợi Server trả kết quả để render lại tổng tiền chuẩn, 
     // còn tạm tính UI sẽ mượn tạm nội dung hiển thị text.
     headerEl.innerHTML += ' <i class="fas fa-sync fa-spin ml-1 text-xs text-gray-400"></i>';
  }
}

function submitDataToServer(payload, transactionType) {
  google.script.run.withSuccessHandler(function(res) {
    if(payload.category === 'Khác' && payload.customCategory.trim() !== '') {
      google.script.run.withSuccessHandler(r => { if (r.success) globalCategories = r.data; }).getDropdownCategories();
    }
    if (res.success) {
      loadTransactions(transactionType); 
      if(typeof loadDashboard === 'function') loadDashboard();
    } else { 
      alert("Lỗi lưu DB: " + res.message); 
      const errorRow = document.getElementById(`row-${payload.id}`);
      if(errorRow) errorRow.remove();
    }
  }).withFailureHandler(err => { 
    alert("Lỗi mạng: " + err.toString()); 
    const errorRow = document.getElementById(`row-${payload.id}`);
    if(errorRow) errorRow.remove();
  }).saveTransaction(payload);
}

function deleteTx(id, type) {
  if(!confirm("Bạn có chắc chắn muốn xóa giao dịch này không?")) return;
  
  const row = document.getElementById(`row-${id}`);
  if(row) row.style.opacity = '0.3';
  
  google.script.run.withSuccessHandler(res => {
    if(res.success) {
      if(row) row.remove();
      loadTransactions(type);
      if(typeof loadDashboard === 'function') loadDashboard();
    } else {
      alert(res.message);
      if(row) row.style.opacity = '1';
    }
  }).deleteTransaction(id);
}

function editTx(id, oldAmount) {
  const newAmtStr = prompt("Chỉnh sửa số tiền giao dịch:", oldAmount);
  if(newAmtStr === null || newAmtStr === "") return;
  
  // Rửa sạch dấu chấm đề phòng người dùng nhập tay 50.000
  const newAmt = newAmtStr.replace(/\./g, '');
  if(isNaN(newAmt)) return;
  
  const row = document.getElementById(`row-${id}`);
  if(row) row.style.opacity = '0.5';
  
  google.script.run.withSuccessHandler(res => {
    if(res.success) {
      const type = currentTab === 'income' ? 'Thu' : 'Chi';
      loadTransactions(type);
      if(typeof loadDashboard === 'function') loadDashboard();
    } else {
      alert(res.message);
      if(row) row.style.opacity = '1';
    }
  }).updateTransactionAmount(id, newAmt);
}
</script>
